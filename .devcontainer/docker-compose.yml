# Devcontainer service for local ZMK builds.
#
# The firmware build itself runs in a separate zmk-build-arm container launched
# by build.sh against the host daemon (docker-outside-of-docker). Its west
# dependency cache lives in a host-daemon-managed named volume
# (zmk-config-west-cache) created on first build, so it is not declared here.
services:
  zmk:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/zmk-config:cached
    command: sleep infinity
