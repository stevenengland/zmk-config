name: keymap-app CI

on:
  pull_request:
    paths:
      - "keymap-app/**"
      - ".github/workflows/keymap-app.yml"

defaults:
  run:
    working-directory: keymap-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: keymap-app/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build single-file bundle
        run: npm run build

      - name: Upload index.html
        uses: actions/upload-artifact@v4
        with:
          name: keymap-app-index-html
          path: keymap-app/dist/index.html
          if-no-files-found: error
